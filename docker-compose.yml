services:
  # Main Backend (Node.js)
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/sep_training
      - GPU_SERVICE_URL=http://gpu-service:5000
      - PORT=3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_key}
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - app-network

  # Frontend (React/Vite)
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  # GPU Service (Python/Unsloth)
  gpu-service:
    build: ./gpu-service
    ports:
      - "5000:5000"
    environment:
      - NGROK_TOKEN=${NGROK_TOKEN:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - BACKEND_URL=http://backend:3000
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - app-network

  # Database
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
