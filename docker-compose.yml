services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: sep490_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── GPU Service ────────────────────────────────────────────────────────────
  gpu-service:
    image: hoanglam51/sep490-gpu-service:latest
    container_name: sep490_gpu
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - TORCHDYNAMO_DISABLE=1
      - CUDA_LAUNCH_BLOCKING=1
      - BACKEND_URL=http://backend:3000
    # Không expose ra host — backend gọi nội bộ qua http://gpu-service:5000
    expose:
      - "5000"
    volumes:
      - gpu_checkpoints:/tmp/checkpoints_
      - gpu_uploads:/app/dataset_uploads
    networks:
      - app_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    image: hoanglam51/sep490-backend:latest
    container_name: sep490_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/sep_training
      # Kết nối nội bộ tới gpu-service — không qua ngrok/IP ngoài
      - GPU_SERVICE_URL=http://gpu-service:5000
      - PORT=3000
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app_network
    depends_on:
      mongo:
        condition: service_healthy
      gpu-service:
        condition: service_started

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    image: hoanglam51/sep490-frontend:latest
    container_name: sep490_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      # Port 443 chỉ dùng trên production server (có SSL cert)
      # - "443:443"
    networks:
      - app_network
    depends_on:
      - backend

  # ── Certbot (tự động gia hạn SSL) ─────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: sep490_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local
  gpu_checkpoints:
    driver: local
  gpu_uploads:
    driver: local
  certbot_certs:
    driver: local
  certbot_webroot:
    driver: local

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
